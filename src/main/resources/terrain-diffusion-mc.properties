# Terrain Diffusion MC configuration

# Inference device: "cpu", "gpu", or "auto" (try GPU first then fall back to CPU).
# Ignored for the CPU build.
inference.device=gpu

# Preferred GPU backend when inference.device uses the GPU path.
# "auto" tries MIGraphX, then ROCm, then CUDA, then DirectML.
inference.provider=auto

# Optional path to a directory containing custom ONNX Runtime native libraries.
# This is useful when testing a locally built ROCm/MIGraphX-enabled ORT package.
# Leave blank to use the libraries bundled in the mod jar.
inference.native_path=

# Offload inactive models from VRAM so only one model occupies the GPU at a time.
# Keeps peak VRAM to 1.5-2 GB. Set to false if you have ~2.5+ GB of free VRAM for
# slightly faster generation (avoids reloading sessions between pipeline stages).
inference.offload_models=true

# ONNX Runtime CPU workers used to prepare GPU inference. The terrain pipeline
# is serialized, so keep these at 1 to prevent three resident model sessions
# from saturating CPU cores through worker-pool spin waiting.
inference.onnx_intra_op_threads=1
inference.onnx_inter_op_threads=1

# RX 7000-series GPUs accelerate the models substantially in FP16. MIGraphX
# keeps full-precision inputs/outputs while quantizing its internal program.
inference.migraphx_fp16=true

# Persistent MIGraphX compiled-program cache. Leave blank for the default model directory.
inference.migraphx_model_cache_path=

# Reduce latent/decoder tile overlap to lower repeated ONNX inference. This generates terrain
# faster but provides less blending at tile borders. Leave false for the original quality mode.
generation.performance_mode=false

# Generate and cache a square batch of tiles around the first request. A value of 4 produces
# one 1024x1024 block batch for the default 256 block tile size, then serves its 16 subtiles
# directly from memory. Set to 1 to disable prefetching.
generation.prefetch_tiles=4

# Validate SHA-256 for pre-existing files in .minecraft/terrain-diffusion-models.
# Set to false to allow custom user-provided models/config without hash checks.
validate_model=true

# Port for the local terrain explorer web UI (started with /td-explore command).
explorer.port=19801

# Terrain generation region side length in blocks. Must be a power of 2.
# Examples: 128, 256, 512, 1024.
# Use larger values to generate in larger batches (more chunks per second)
# Use smaller values to generate in smaller batches (most responsive)
tile_size=256
